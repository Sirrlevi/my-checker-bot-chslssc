name: SSC CHSL Watcher 🔔

on:
  schedule:
    # Every 5 minutes — GitHub Actions minimum granularity
    - cron: '*/5 * * * *'
  # Manual trigger from Actions UI (useful for testing)
  workflow_dispatch:

# Only one run at a time — prevents race conditions on state.json
concurrency:
  group: ssc-watcher
  cancel-in-progress: false   # never cancel; let running job finish

permissions:
  contents: write   # needed to commit state.json back to repo

jobs:
  watch:
    name: Check SSC & Notify
    runs-on: ubuntu-latest
    timeout-minutes: 3          # hard cap — keeps monthly minutes low

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          # Always pull latest state.json (written by previous run)
          fetch-depth: 1

      # ── 2. Python ──────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'            # cache deps → faster startup

      # ── 3. Dependencies ────────────────────────────────────────────────────
      - name: Install dependencies
        run: pip install --quiet requests beautifulsoup4

      # ── 4. Run checker ─────────────────────────────────────────────────────
      - name: Run SSC CHSL checker
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID:   ${{ secrets.CHAT_ID }}
        run: python scripts/checker.py

      # ── 5. Commit updated state.json ────────────────────────────────────────
      #       This is what gives us persistent state across workflow runs.
      #       If state.json didn't change, git commit is a no-op.
      - name: Persist state
        run: |
          git config user.name  "ssc-watcher[bot]"
          git config user.email "ssc-watcher[bot]@users.noreply.github.com"
          git add state.json
          git diff --staged --quiet || git commit -m "chore: update watcher state [skip ci]"
          for i in 1 2 3; do git pull --rebase origin ${GITHUB_REF_NAME:-main} || true; git push && break; sleep $((i*5)); done
